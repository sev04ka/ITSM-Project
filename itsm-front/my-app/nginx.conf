# frontend/nginx.conf

server {
    # ✅ Порт для прослушивания
    listen 80;
    server_name localhost;

    # ✅ Корневая директория со статическими файлами
    root /usr/share/nginx/html;
    index index.html;

    # ✅ Сжатие gzip для уменьшения трафика
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # ✅ Кэширование статических файлов (CSS, JS, изображения)
    # Файлы с хэшем в имени можно кэшировать долго (1 год)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ✅ Основное приложение (SPA роутинг)
    # Все запросы перенаправляются на index.html
    # React Router сам разберётся с путями на клиенте
    location / {
        try_files $uri $uri/ /index.html;
        
        # ✅ Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # ✅ Проксирование API запросов на backend
    # Все запросы на /api/ идут на Django контейнер
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # ✅ Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # ✅ Буферы
        proxy_buffering off;
    }

    # ✅ Страница ошибки 404
    error_page 404 /index.html;
}